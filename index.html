<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두근두근! 전공 연애 시뮬레이션</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'HSBombaram';
      src: url('./fonts/HSBombaram.ttf') format('truetype');
    }

    :root {
      --pink: #FF7AB2;
      --blue: #7ACFFF;
      --white: #FFFFFF;
      --bg: #1a0f2e;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,122,178,0.3);
      --dialog-bg: rgba(10,6,20,0.92);
      --text-main: rgba(255,255,255,0.92);
      --text-sub: rgba(255,200,220,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100vw;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      max-width: 390px;
      margin: 0 auto;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    .screen {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ─────────────────────────────────────────
       SCREEN 1 · ONBOARDING
    ───────────────────────────────────────── */
    #screen-onboarding {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--del, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.4); }
      50%       { opacity: 1; transform: scale(1);   }
    }

    .onboarding-content {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 40px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ob-title {
      font-family: 'HSBombaram', cursive;
      font-size: 27px;
      color: var(--pink);
      text-align: center;
      line-height: 1.45;
      margin-bottom: 14px;
      text-shadow: 0 0 24px rgba(255,122,178,0.55);
    }
    .ob-subtitle {
      font-size: 12.5px;
      color: var(--text-sub);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .field {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .field::placeholder { color: var(--text-sub); }
    .field:focus { border-color: var(--pink); }

    .btn-main {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      background: linear-gradient(135deg, var(--pink), #d9549a);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .18s, transform .1s;
    }
    .btn-main:active { opacity: .85; transform: scale(.98); }

    /* ─────────────────────────────────────────
       SCREEN 2 · REGISTRATION
    ───────────────────────────────────────── */
    #screen-registration { background: var(--bg); }

    .fixed-top {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      z-index: 200;
      background: rgba(26,15,46,.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fixed-top-title {
      font-family: 'HSBombaram', cursive;
      font-size: 21px;
      color: var(--pink);
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 70px 16px 90px;
    }

    .course-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .cc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .cc-num { font-size: 12px; color: var(--text-sub); }
    .btn-del {
      background: none;
      border: 1px solid rgba(255,80,80,.4);
      color: rgba(255,100,100,.75);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
    }

    .cc-input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,122,178,.2);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    .cc-input::placeholder { color: var(--text-sub); }
    .cc-input:focus { border-color: var(--pink); }

    .sec-label {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 7px;
      letter-spacing: .04em;
    }

    .gender-row {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
    }
    .btn-gender {
      flex: 1;
      padding: 8px 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-gender.sel {
      background: rgba(255,122,178,.18);
      border-color: var(--pink);
      color: var(--pink);
    }

    .persona-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .btn-persona {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 8px;
      color: var(--text-sub);
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all .18s;
    }
    .btn-persona.sel {
      background: rgba(122,207,255,.14);
      border-color: var(--blue);
      color: var(--blue);
    }
    .pn { font-size: 13px; font-weight: 500; display: block; margin-bottom: 2px; }
    .pd { font-size: 10px; opacity: .7; line-height: 1.3; }

    .fixed-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      z-index: 200;
      background: rgba(26,15,46,.97);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 10px;
    }
    .btn-add {
      flex: 1;
      padding: 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--pink);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-reg-done {
      flex: 1;
      padding: 13px;
      background: linear-gradient(135deg, var(--pink), #d9549a);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ─────────────────────────────────────────
       SCREEN 3 · GAME
    ───────────────────────────────────────── */
    #screen-game { background: var(--bg); position: relative; }

    .scene {
      position: relative;
      height: 55vh;
      height: 55dvh;
      flex-shrink: 0;
      overflow: hidden;
    }
    .scene-bg {
      position: absolute;
      inset: 0;
      background: url('./images/campus.jpeg') center top / cover no-repeat;
    }
    .scene-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(26,15,46,.18) 0%,
        rgba(26,15,46,.45) 55%,
        rgba(26,15,46,1)   100%
      );
    }

    /* ───────────── COURSE DROPDOWN (게임 화면 좌상단) ───────────── */
    .course-dd {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 30;
      max-width: 68%;
    }
    .course-dd-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10,6,20,.78);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 12px;
      color: rgba(255,255,255,.92);
      cursor: pointer;
      max-width: 100%;
      text-align: left;
    }
    .course-dd-title {
      font-family: 'HSBombaram', cursive;
      font-size: 15px;
      color: var(--pink);
      line-height: 1.1;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .course-dd-caret {
      color: rgba(255,255,255,.78);
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .course-dd-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 220px;
      max-width: 100%;
      background: rgba(10,6,20,.96);
      border: 1px solid rgba(255,122,178,.28);
      border-radius: 16px;
      overflow: hidden;
      display: none;
      box-shadow: 0 18px 46px rgba(0,0,0,.45);
    }
    .course-dd-menu.show { display: block; }
    .course-dd-item {
      padding: 10px 12px;
      font-size: 13px;
      color: rgba(255,255,255,.88);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,.06);
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.25;
      background: transparent;
    }
    .course-dd-item:hover { background: rgba(255,122,178,.14); }
    .course-dd-item.active { background: rgba(255,122,178,.20); color: var(--pink); }
    .course-dd-item.add { color: rgba(122,207,255,.95); }
    .course-dd-item.add:hover { background: rgba(122,207,255,.14); }

    .aff-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(10,6,20,.78);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      min-width: 108px;
    }
    .aff-stage {
      font-size: 10px;
      color: var(--pink);
      text-align: center;
      margin-bottom: 5px;
    }
    .aff-bar-bg {
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .aff-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--blue));
      border-radius: 3px;
      transition: width .5s ease;
      width: 0%;
    }
    .aff-val {
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,.82);
    }
    .aff-heart {
      color: var(--pink);
      font-size: 12px;
      line-height: 1;
      display: inline-block;
      transform-origin: center;
      text-shadow: 0 0 14px rgba(255,122,178,.35);
    }
    .aff-heart.beat { animation: heartbeat .32s ease-in-out 1; }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      35% { transform: scale(1.35); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .btn-reset {
      position: absolute;
      top: 10px;
      right: 130px;
      z-index: 11;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: transparent;
      border: none;
      color: var(--pink);
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      transition: transform .08s, opacity .15s, filter .15s;
      text-shadow: 0 0 18px rgba(255,122,178,.35);
    }
    .btn-reset:hover { filter: brightness(1.08); }
    .btn-reset:active { transform: scale(.98); opacity: .9; }

    /* ───────────── CHARACTER (크게, 갇힘 제거, 대화창 뒤로 자연스럽게) ───────────── */
    .char-holder {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 390px);
      height: 78%;
      top: 8%;
      z-index: 9; /* dialog(10)보다 아래라 하단이 자연스럽게 가려짐 */
      pointer-events: none;
    }
    .char-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
    }
    .char-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255,122,178,.55);
      text-align: center;
      padding: 10px;
    }

    .dialog {
      height: 45vh;
      height: 45dvh;
      background: var(--dialog-bg);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px 14px;
      gap: 7px;
      position: relative;
      z-index: 10;
    }

    .dlg-name {
      display: inline-flex;
      background: var(--pink);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
      align-self: flex-start;
      max-width: 78%;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .dlg-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-tasks {
      padding: 7px 10px;
      background: rgba(122,207,255,.14);
      border: 1px solid rgba(122,207,255,.35);
      border-radius: 10px;
      color: var(--blue);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .guide {
      display: none;
      flex-shrink: 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,122,178,.12);
      border: 1px solid rgba(255,122,178,.25);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      line-height: 1.45;
    }
    .guide.show { display: block; }

    .tasks-drawer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: flex-end;
      z-index: 3000;
    }
    .tasks-drawer.show { display: flex; }
    .tasks-sheet {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      background: rgba(10,6,20,.96);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 18px;
      max-height: 70vh;
      overflow: hidden;
    }
    .tasks-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .tasks-title {
      font-family: 'HSBombaram', cursive;
      color: var(--pink);
      font-size: 18px;
    }
    .btn-close {
      padding: 7px 10px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .tasks-list {
      overflow: auto;
      max-height: calc(70vh - 60px);
      padding-right: 4px;
    }
    .task-item {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,122,178,.18);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .task-course {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.92);
    }
    .task-text {
      font-size: 12.5px;
      line-height: 1.55;
      color: rgba(255,255,255,.82);
      white-space: pre-wrap;
    }
    .btn-task-done {
      padding: 7px 10px;
      background: rgba(255,122,178,.14);
      border: 1px solid rgba(255,122,178,.35);
      border-radius: 10px;
      color: var(--pink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dlg-text {
      flex: 1;
      color: var(--text-main);
      font-size: 14px;
      line-height: 1.75;
      overflow-y: auto;
      min-height: 0;
    }

    .mode-row {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-mode {
      flex: 1;
      padding: 8px 3px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-sub);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11.5px;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-mode.active {
      background: rgba(122,207,255,.14);
      border-color: var(--blue);
      color: var(--blue);
    }
    .btn-done {
      padding: 8px 10px;
      background: rgba(255,122,178,.13);
      border: 1px solid var(--pink);
      border-radius: 10px;
      color: var(--pink);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11.5px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-shrink: 0;
    }
    .dlg-input {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 13px;
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .dlg-input::placeholder { color: var(--text-sub); }
    .dlg-input:focus { border-color: var(--pink); }
    .btn-send {
      width: 38px;
      height: 38px;
      background: var(--pink);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-send:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-get-task {
      padding: 8px 10px;
      background: rgba(255,122,178,.14);
      border: 1px solid rgba(255,122,178,.35);
      border-radius: 10px;
      color: var(--pink);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11.5px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity .15s, transform .08s;
    }
    .btn-get-task:active { transform: scale(.98); opacity: .92; }

    .dots::after {
      content: '.';
      animation: dotanim 1.2s infinite;
    }
    @keyframes dotanim {
      0%   { content: '.';   }
      33%  { content: '..';  }
      66%  { content: '...'; }
      100% { content: '.';   }
    }

    .aff-notif {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      background: rgba(255,122,178,.92);
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      z-index: 9999;
      pointer-events: none;
      animation: notif 2.1s ease forwards;
    }
    @keyframes notif {
      0%   { opacity: 0; transform: translate(-50%, -65%); }
      18%  { opacity: 1; transform: translate(-50%, -50%); }
      72%  { opacity: 1; transform: translate(-50%, -50%); }
      100% { opacity: 0; transform: translate(-50%, -38%); }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════
       SCREEN 1 · ONBOARDING
  ══════════════════════════════ -->
  <div id="screen-onboarding" class="screen active">
    <div id="stars"></div>
    <div class="onboarding-content">
      <div class="ob-title">두근두근!<br>전공 연애 시뮬레이션</div>
      <div class="ob-subtitle">～수강신청했더니 과목들이<br>나를 좋아하기 시작했다～</div>
      <input class="field" id="inp-nick"   type="text" placeholder="닉네임을 입력하세요">
      <input class="field" id="inp-school" type="text" placeholder="학교를 입력하세요">

<script>
/* ───────────── CONSTANTS ───────────── */
const GEMINI_KEY = 'AIzaSyCFLddZKpx8e6CzjLGuQsW38Mt2jXQPn-4';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY;

const PERSONAS = [
  { name: '츤데레',  desc: '차갑게 굴지만 신경 씀' },
  { name: '단데레',  desc: '조용하지만 깊이 애정' },
  { name: '얀데레',  desc: '너만 바라보는 타입' },
  { name: '쿨데레',  desc: '냉정하지만 빈틈 있음' },
  { name: '원기왕성',desc: '밝고 에너지 넘침' },
  { name: '선배형',  desc: '의젓하고 믿음직함' },
];

const STAGES = [
  { min:  0, name: '첫 만남',    line: '...수강신청한 사람이 너야?' },
  { min: 20, name: '안면 있음',  line: '뭐, 생각보다 열심히 하네.' },
  { min: 40, name: '친밀감 형성',line: '오늘도 왔구나. ...기다렸어.' },
  { min: 60, name: '독점욕 발생',line: '다른 과목이랑 같이 공부하지 마.' },
  { min: 80, name: '엔딩 해금',  line: '...사실 처음부터 너만 봤어.' },
];

const GENDERS = ['남성', '여성', '중성'];

/* ───────────── STATE ───────────── */
let S = { nick:'', school:'', major:'', courses:[], curIdx:0, mode:'task' };

/* ───────────── STORAGE ───────────── */
function save() { localStorage.setItem('dkdk', JSON.stringify(S)); }
function load() {
  try { const d = JSON.parse(localStorage.getItem('dkdk')||'null'); if(d) S = Object.assign(S,d); }
  catch(e){}
}

/* ───────────── SCREENS ───────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ───────────── STARS ───────────── */
function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const sz = Math.random() * 2.8 + .8;
    el.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;--del:${Math.random()*5}s`;
    c.appendChild(el);
  }
}

/* ───────────── SCREEN 1 ───────────── */
function goToReg() {
  const nick   = document.getElementById('inp-nick').value.trim();
  const school = document.getElementById('inp-school').value.trim();
  const major  = document.getElementById('inp-major').value.trim();
  if (!nick || !school || !major) { alert('모든 항목을 입력해주세요.'); return; }
  S.nick = nick; S.school = school; S.major = major;
  if (!S.courses.length) pushCourse();
  save();
  show('registration');
  renderCourses();
}

/* ───────────── SCREEN 2 ───────────── */
function pushCourse() {
  S.courses.push({ name:'', gender:'중성', persona:'츤데레', affection:0, taskPending:false, taskText:'', lastText:'' });
}

function addCourse() {
  pushCourse(); save(); renderCourses();
  setTimeout(() => { document.getElementById('course-list').scrollTop = 99999; }, 60);
}

function delCourse(i) { S.courses.splice(i,1); save(); renderCourses(); }
function setName(i,v) { S.courses[i].name = v; save(); }

function setGender(i,v,btn) {
  S.courses[i].gender = v; save();
  btn.closest('.gender-row').querySelectorAll('.btn-gender').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function setPersona(i,v,btn) {
  S.courses[i].persona = v; save();
  btn.closest('.persona-grid').querySelectorAll('.btn-persona').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function renderCourses() {
  const list = document.getElementById('course-list');
  list.innerHTML = '';
  S.courses.forEach((c,i) => {
    const card = document.createElement('div');
    card.className = 'course-card';
    card.innerHTML = `
      <div class="cc-head">
        <span class="cc-num">과목 ${i+1}</span>
        <button class="btn-del" onclick="delCourse(${i})">삭제</button>
      </div>
      <input class="cc-input" placeholder="과목명을 입력하세요" value="${esc(c.name)}" oninput="setName(${i},this.value)">
      <div class="sec-label">성별</div>
      <div class="gender-row">
        ${GENDERS.map(g=>`<button class="btn-gender${c.gender===g?' sel':''}" onclick="setGender(${i},'${g}',this)">${g}</button>`).join('')}
      </div>
      <div class="sec-label">성격</div>
      <div class="persona-grid">
        ${PERSONAS.map(p=>`<button class="btn-persona${c.persona===p.name?' sel':''}" onclick="setPersona(${i},'${p.name}',this)"><span class="pn">${p.name}</span><span class="pd">${p.desc}</span></button>`).join('')}
      </div>`;
    list.appendChild(card);
  });
}

function finishReg() {
  const valid = S.courses.filter(c => c.name.trim());
  if (!valid.length) { alert('과목명을 최소 1개 이상 입력해주세요.'); return; }
  S.courses = valid; save();
  show('game'); initGame();
}

/* ───────────── SCREEN 3 ───────────── */
function initGame() { initCourseUI(); selectCourse(S.curIdx < S.courses.length ? S.curIdx : 0); }

function initCourseUI() {
  renderCourseMenu();
  // Close menu when clicking outside.
  document.addEventListener('click', function (e) {
    const menu = document.getElementById('course-dd-menu');
    const btn  = document.getElementById('course-dd-btn');
    if (!menu || !btn) return;
    if (!menu.classList.contains('show')) return;
    const t = e && e.target;
    if (btn.contains(t) || menu.contains(t)) return;
    closeCourseMenu();
  });
}

function selectCourse(i) {
  S.curIdx = i; save();
  const c = S.courses[i];
  document.getElementById('dlg-name').textContent = c.name || `과목${i+1}`;
  updateAffUI(c.affection);
  updateCharImage(c);
  renderCourseMenu();
  // Reset mode UI
  document.getElementById('btn-task').classList.add('active');
  document.getElementById('btn-qna').classList.remove('active');
  S.mode = 'task';
  // API 호출 최소화: 같은 과목 재선택 시 기존 대사 유지
  if (c.lastText && String(c.lastText).trim()) typeText(c.lastText);
  else typeText(getStage(c.affection).line);
}

function normalizeFilePart(s) {
  return (s || '').replace(/[\/\\]/g, '_').trim();
}

function updateCharImage(course) {
  const img = document.getElementById('char-img');
  const fb  = document.getElementById('char-fallback');
  if (!img || !fb) return;

  const gender  = normalizeFilePart(course && course.gender);
  const persona = normalizeFilePart(course && course.persona);
  const src = './images/characters/' + gender + '_' + persona + '.png';

  fb.style.display = 'none';
  img.style.display = 'block';
  img.onerror = function () {
    // Try default image once, then fall back to text.
    if (img.getAttribute('data-tried-default') === '1') {
      img.style.display = 'none';
      fb.style.display = 'flex';
      fb.textContent = '이미지 준비중';
      img.onerror = null;
      return;
    }
    img.setAttribute('data-tried-default', '1');
    img.src = './images/characters/default.png';
  };
  img.removeAttribute('data-tried-default');
  img.src = src;
}

/* ───────────── GUIDE ───────────── */
let _guideTid = null;
function showGuide(msg, ms) {
  const el = document.getElementById('guide');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  if (_guideTid) { clearTimeout(_guideTid); _guideTid = null; }
  _guideTid = setTimeout(() => { el.classList.remove('show'); }, ms || 3800);
}

function maybeGuideForRefusal() {
  const c = S.courses[S.curIdx];
  if (!c) return;
  if ((c.affection || 0) < 20) {
    showGuide('호감도가 낮아 대화를 거절당했습니다. [내 과제함]에서 과제를 완료해 점수를 쌓아보세요!', 5200);
  } else {
    showGuide('캐릭터가 잠시 대답을 거부했어요. [과제 전달]로 새 과제를 받아보거나, 잠시 후 다시 시도해보세요.', 5200);
  }
}

/* ───────────── TASKS DRAWER ───────────── */
function openTasks() { renderTaskDrawer(); document.getElementById('tasks-drawer').classList.add('show'); }
function closeTasks(byBackdrop) { document.getElementById('tasks-drawer').classList.remove('show'); }

function renderTaskDrawer() {
  const list = document.getElementById('tasks-list');
  if (!list) return;
  list.innerHTML = '';

  const pending = S.courses.map((c, idx) => ({ c, idx })).filter(x => x.c && x.c.taskPending);
  if (!pending.length) {
    const empty = document.createElement('div');
    empty.className = 'task-item';
    empty.innerHTML = `<div class="task-course">진행 중인 과제가 없어요</div><div class="task-text">[과제 전달]을 눌러 새 과제를 받아보세요.</div>`;
    list.appendChild(empty);
    return;
  }

  pending.forEach(({ c, idx }) => {
    const item = document.createElement('div');
    item.className = 'task-item';
    const title = (c.name || `과목${idx + 1}`);
    item.innerHTML = `
      <div class="task-top">
        <div class="task-course">${esc(title)}</div>
        <button class="btn-task-done" onclick="completeTaskFor(${idx})">완료 +10</button>
      </div>
      <div class="task-text">${esc(c.taskText || '과제 내용이 아직 없어요. [과제 전달]을 눌러 받아보세요.')}</div>
    `;
    list.appendChild(item);
  });
}

/* ───────────── AFFECTION ───────────── */
function getStage(v) {
  let st = STAGES[0];
  for (const s of STAGES) { if (v >= s.min) st = s; }
  return st;
}

function updateAffUI(v) {
  v = Math.max(0, Math.min(100, v));
  document.getElementById('aff-bar').style.width = v + '%';
  document.getElementById('aff-num').textContent = v + ' / 100';
  document.getElementById('aff-stage').textContent = getStage(v).name;
}

function changeAff(delta) {
  const c = S.courses[S.curIdx];
  const prevName = getStage(c.affection).name;
  c.affection = Math.max(0, Math.min(100, (c.affection||0) + delta));
  save(); updateAffUI(c.affection);
  flashNotif(delta > 0 ? `+${delta} 호감도 상승!` : `${delta} 호감도 감소`);
  if (delta > 0) {
    const h = document.getElementById('aff-heart');
    if (h) {
      h.classList.remove('beat');
      // reflow
      void h.offsetWidth;
      h.classList.add('beat');
    }
  }
  if (getStage(c.affection).name !== prevName) {
    setTimeout(() => typeText(getStage(c.affection).line), 600);
  }
}

/* ───────────── RESET ───────────── */
function resetGame() {
  if (!confirm('정말 초기화할까요? 저장된 데이터가 삭제되고 처음부터 다시 시작합니다.')) return;
  localStorage.removeItem('dkdk');
  location.reload();
}

/* ───────────── COURSE DROPDOWN ───────────── */
function toggleCourseMenu() {
  const m = document.getElementById('course-dd-menu');
  if (!m) return;
  if (m.classList.contains('show')) closeCourseMenu();
  else openCourseMenu();
}

function openCourseMenu() {
  renderCourseMenu();
  const m = document.getElementById('course-dd-menu');
  if (m) m.classList.add('show');
}

function closeCourseMenu() {
  const m = document.getElementById('course-dd-menu');
  if (m) m.classList.remove('show');
}

function renderCourseMenu() {
  const title = document.getElementById('course-dd-title');
  const menu = document.getElementById('course-dd-menu');
  if (!title || !menu) return;
  const cur = S.courses[S.curIdx];
  title.textContent = (cur && cur.name) ? cur.name : `과목${S.curIdx + 1}`;

  menu.innerHTML = '';
  S.courses.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'course-dd-item' + (i === S.curIdx ? ' active' : '');
    item.textContent = (c && c.name) ? c.name : `과목${i + 1}`;
    item.onclick = function () { closeCourseMenu(); selectCourse(i); };
    menu.appendChild(item);
  });

  const add = document.createElement('div');
  add.className = 'course-dd-item add';
  add.textContent = '+ 새 과목 추가';
  add.onclick = function () {
    closeCourseMenu();
    show('registration');
    renderCourses();
  };
  menu.appendChild(add);
}

function flashNotif(msg) {
  const el = document.createElement('div');
  el.className = 'aff-notif'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

/* ───────────── MODE ───────────── */
function setMode(m) {
  S.mode = m;
  document.getElementById('btn-task').classList.toggle('active', m==='task');
  document.getElementById('btn-qna').classList.toggle('active',  m==='qna');
  // 모드 전환만 하고 자동 API 호출은 하지 않음
}

function requestTask() {
  // 버튼으로만 과제 요청(API 호출)
  if (S.mode !== 'task') setMode('task');
  triggerTask();
}

async function triggerTask() {
  const c = S.courses[S.curIdx];
  if (!canCallGeminiOrGuide()) return;
  c.taskPending = true; save();
  const stage = getStage(c.affection);
  const sys = `당신은 ${c.name} 과목이 ${c.gender} 미연시 캐릭터로 의인화된 존재입니다. 성격은 ${c.persona}이고 호감도 ${c.affection}/100, 단계는 ${stage.name}입니다. 이 단계에 맞는 감정으로 과제/공지를 2-3문장 반말로 전달하세요.`;
  showLoading();
  const t = await gemini(sys, '오늘의 과제를 알려줘');
  c.taskText = t;
  c.lastText = t;
  save();
  typeText(t);
  // If user has task drawer open, refresh it.
  const dr = document.getElementById('tasks-drawer');
  if (dr && dr.classList.contains('show')) renderTaskDrawer();
}

/* ───────────── COMPLETE TASK ───────────── */
async function completeTaskFor(i) {
  const c = S.courses[i];
  if (!c) return;
  if (!canCallGeminiOrGuide()) return;
  c.taskPending = false; save();
  // If completing a non-selected course, still apply affection to that course.
  if (S.curIdx === i) changeAff(10);
  else {
    const prevName = getStage(c.affection).name;
    c.affection = Math.max(0, Math.min(100, (c.affection||0) + 10));
    save();
    if (S.curIdx === i) updateAffUI(c.affection);
    flashNotif('+10 호감도 상승!');
    if (getStage(c.affection).name !== prevName) {
      setTimeout(() => typeText(getStage(c.affection).line), 600);
    }
  }
  const stage = getStage(c.affection);
  const sys = `당신은 ${c.name} 과목이 ${c.gender} 미연시 캐릭터입니다. 성격은 ${c.persona}, 호감도 ${c.affection}/100입니다. 학생이 과제를 완료했을 때 ${stage.name} 단계에 맞는 반응을 2문장 반말로 해주세요.`;
  showLoading();
  const t = await gemini(sys, '과제 완료했어');
  c.lastText = t;
  save();
  typeText(t);
  renderTaskDrawer();
}

/* ───────────── SEND MESSAGE ───────────── */
let isLoading = false;
async function sendMsg() {
  if (isLoading) return;
  const inp = document.getElementById('dlg-input');
  const msg = inp.value.trim();
  if (!msg) return;
  if (!canCallGeminiOrGuide()) return;
  inp.value = '';
  const c = S.courses[S.curIdx];
  const stage = getStage(c.affection);
  let sys;
  if (S.mode === 'task') {
    sys = `당신은 ${c.name} 과목이 ${c.gender} 미연시 캐릭터로 의인화된 존재입니다. 성격은 ${c.persona}이고 호감도 ${c.affection}/100, 단계는 ${stage.name}입니다. 이 단계에 맞는 감정으로 과제/공지를 2-3문장 반말로 전달하세요.`;
  } else {
    sys = `당신은 ${c.name} 과목이 ${c.gender} 미연시 캐릭터입니다. 성격은 ${c.persona}, 호감도 ${c.affection}/100입니다. 학생 질문에 ${c.name} 지식으로 답하되 캐릭터 말투(반말)를 유지하세요.`;
    changeAff(3);
  }
  showLoading();
  isLoading = true;
  try {
    const t = await gemini(sys, msg);
    c.lastText = t;
    save();
    typeText(t);
  } finally {
    isLoading = false;
  }
}

/* ───────────── GEMINI API ───────────── */
let _geminiInFlight = false;
let _geminiNextAllowedAt = 0;

function _parseRetrySeconds(msg) {
  const m = String(msg || '').match(/retry in\s+([0-9.]+)s/i);
  if (!m) return 0;
  const sec = parseFloat(m[1]);
  return isFinite(sec) ? sec : 0;
}

function _geminiBlockedMessage() {
  const waitMs = Math.max(0, _geminiNextAllowedAt - Date.now());
  const waitS = Math.ceil(waitMs / 1000);
  if (waitS > 0) return `요즘 좀 바빠… ${waitS}초만 기다렸다가 다시 말해줘.`;
  return '잠깐만… 지금 대답 준비 중이야. 조금만 기다려줘!';
}

function canCallGeminiOrGuide() {
  if (_geminiInFlight) { showGuide(_geminiBlockedMessage(), 1800); return false; }
  if (Date.now() < _geminiNextAllowedAt) { showGuide(_geminiBlockedMessage(), 2600); return false; }
  return true;
}

function setSendDisabled(disabled) {
  const btn = document.getElementById('btn-send');
  if (btn) btn.disabled = !!disabled;
}

async function gemini(systemPrompt, userMsg) {
  const FALLBACK = '...잠깐, 연결이 끊긴 것 같아. 다시 말해줘.';
  try {
    _geminiInFlight = true;
    setSendDisabled(true);
    console.log('[dkdk] Gemini call start', { mode: S && S.mode, courseIdx: S && S.curIdx });
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: userMsg }] }]
      })
    });
    let d = null;
    try { d = await res.json(); }
    catch (e) {
      console.error('[dkdk] Gemini non-JSON response', { status: res && res.status, statusText: res && res.statusText }, e);
      return FALLBACK;
    }

    console.log('[dkdk] Gemini response meta', { ok: res && res.ok, status: res && res.status, statusText: res && res.statusText });
    if (!res || !res.ok) {
      console.error('[dkdk] Gemini HTTP error', d);
      // Quota / rate limit handling (429)
      if (res && res.status === 429 && d && d.error) {
        const retrySec = _parseRetrySeconds(d.error.message);
        const waitMs = Math.max(8000, Math.ceil(retrySec * 1000));
        _geminiNextAllowedAt = Date.now() + waitMs;
        console.log('[dkdk] Gemini rate-limited. nextAllowedAt=', new Date(_geminiNextAllowedAt).toISOString());
        showGuide(`지금은 요청이 너무 많아 잠깐 쉬는 중이야. ${Math.ceil(waitMs/1000)}초 뒤에 다시 시도해줘!`, 5200);
      }
      return FALLBACK;
    }
    if (d && d.error) {
      console.error('[dkdk] Gemini API error', d.error);
      return FALLBACK;
    }
    if (!d || !d.candidates || !d.candidates.length) return FALLBACK;
    if (!d.candidates[0] || !d.candidates[0].content || !d.candidates[0].content.parts || !d.candidates[0].content.parts.length) return FALLBACK;
    const txt = d.candidates[0].content.parts[0].text;
    return (txt && String(txt).trim()) ? String(txt).trim() : FALLBACK;
  } catch(e) {
    console.error('[dkdk] Gemini call failed', e);
    return FALLBACK;
  } finally {
    _geminiInFlight = false;
    setSendDisabled(false);
  }
}

/* ───────────── TYPING (한 글자씩 순차) ───────────── */
let _tid = null;

function showLoading() {
  if (_tid) { clearTimeout(_tid); _tid = null; }
  document.getElementById('dlg-text').innerHTML = '<span class="dots"></span>';
}

function typeText(text) {
  if (_tid) { clearTimeout(_tid); _tid = null; }
  const el = document.getElementById('dlg-text');
  el.textContent = '';
  const chars = [...text];
  let i = 0;
  function next() {
    if (i < chars.length) {
      el.textContent += chars[i++];
      _tid = setTimeout(next, 38);
      if (i === 1) {
        // Show guide if character refuses.
        if (String(text).indexOf('...지금은 말하기 싫어.') !== -1) maybeGuideForRefusal();
      }
    }
  }
  next();
}

/* ───────────── UTIL ───────────── */
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ───────────── BOOT ───────────── */
function boot() {
  makeStars();
  load();
  if (S.courses.length && S.nick) { show('game'); initGame(); }
  else if (S.nick)                 { show('registration'); renderCourses(); }
  else {
    show('onboarding');
    if (S.nick)   document.getElementById('inp-nick').value   = S.nick;
    if (S.school) document.getElementById('inp-school').value = S.school;
    if (S.major)  document.getElementById('inp-major').value  = S.major;
  }
}

boot();
